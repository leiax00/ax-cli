name: Manual Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: '编译目标（留空=全部平台）'
        required: false
        type: choice
        options:
          - 'all'
          - 'x86_64-unknown-linux-gnu'
          - 'aarch64-unknown-linux-gnu'
          - 'x86_64-apple-darwin'
          - 'aarch64-apple-darwin'
          - 'x86_64-pc-windows-msvc'
        default: 'all'
      ref:
        description: '分支/标签/commit（默认 main）'
        required: false
        default: 'main'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ax

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        name: Select build targets
        shell: bash
        run: |
          case "${{ github.event.inputs.target }}" in
            "" | all)
              matrix='{"include":[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","artifact":"ax-linux-x86_64"},{"target":"aarch64-unknown-linux-gnu","os":"ubuntu-latest","artifact":"ax-linux-aarch64"},{"target":"x86_64-apple-darwin","os":"macos-latest","artifact":"ax-macos-x86_64"},{"target":"aarch64-apple-darwin","os":"macos-latest","artifact":"ax-macos-aarch64"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest","artifact":"ax-windows-x86_64.exe"}]}'
              ;;
            x86_64-unknown-linux-gnu)
              matrix='{"include":[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","artifact":"ax-linux-x86_64"}]}'
              ;;
            aarch64-unknown-linux-gnu)
              matrix='{"include":[{"target":"aarch64-unknown-linux-gnu","os":"ubuntu-latest","artifact":"ax-linux-aarch64"}]}'
              ;;
            x86_64-apple-darwin)
              matrix='{"include":[{"target":"x86_64-apple-darwin","os":"macos-latest","artifact":"ax-macos-x86_64"}]}'
              ;;
            aarch64-apple-darwin)
              matrix='{"include":[{"target":"aarch64-apple-darwin","os":"macos-latest","artifact":"ax-macos-aarch64"}]}'
              ;;
            x86_64-pc-windows-msvc)
              matrix='{"include":[{"target":"x86_64-pc-windows-msvc","os":"windows-latest","artifact":"ax-windows-x86_64.exe"}]}'
              ;;
          esac

          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Build info
        run: |
          echo "🎯 Target: ${{ matrix.target }}"
          echo "📦 Ref: ${{ github.event.inputs.ref || 'main' }}"
          echo "⚙️  OS: ${{ runner.os }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross compile deps (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Rename (windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe target\${{ matrix.target }}\release\${{ matrix.artifact }}
        shell: cmd

      - name: Show binary size
        run: |
          ls -lh target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          retention-days: 30

  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Build summary
        run: |
          echo "## 📦 编译产物" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 文件 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for file in artifacts/*/*; do
            if [ -f "$file" ]; then
              name=$(basename "$file")
              size=$(ls -lh "$file" | awk '{print $5}')
              echo "| \`${name}\` | ${size} |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ 在 Artifacts 中下载" >> $GITHUB_STEP_SUMMARY
