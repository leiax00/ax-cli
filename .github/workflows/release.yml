name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ax

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ax-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ax-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ax-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ax-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ax-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux 交叉编译依赖
      - name: Install cross compile deps (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe target\${{ matrix.target }}\release\${{ matrix.artifact }}
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -lR artifacts/

      # GitHub Release
      - name: Create GitHub Release
        if: env.GITHUB_SERVER_URL == 'https://github.com'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Gitea Release (用 API 手动创建，因为 Gitea 不完全兼容 gh-release action)
      - name: Create Gitea Release
        if: env.GITHUB_SERVER_URL != 'https://github.com'
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          API_URL="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases"

          # 创建 release
          curl -s -X POST "${API_URL}" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"draft\":false,\"prerelease\":false}" \
            | jq -r '.id' > /tmp/release_id.json

          RELEASE_ID=$(cat /tmp/release_id.json)
          echo "Release ID: ${RELEASE_ID}"

          # 上传所有二进制
          for file in artifacts/*/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Uploading: ${filename}"
              curl -s -X POST "${API_URL}/${RELEASE_ID}/assets?name=${filename}" \
                -H "Authorization: token ${GITEA_TOKEN}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@${file}"
            fi
          done
